<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Admin Panel — Samsudeen Ashad Portfolio</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="assets/css/fontawesome-all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
    <style>
        /* ── Reset & Base ─────────────────────────────────────────── */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --base:#0a0a0f; --surface:#111118; --surface-2:#16161f;
            --accent:#8B5CF6; --accent-2:#3B82F6; --accent-danger:#EF4444;
            --accent-success:#10B981;
            --glass:rgba(255,255,255,0.05); --glass-b:rgba(255,255,255,0.1);
            --text:#fff; --text-2:rgba(255,255,255,0.7); --text-3:rgba(255,255,255,0.45);
            --radius:14px; --radius-sm:8px;
            --grad:linear-gradient(135deg,#3B82F6,#8B5CF6,#EC4899);
        }
        html { height:100%; }
        body { font-family:'Inter',sans-serif; background:var(--base); color:var(--text);
               min-height:100vh; line-height:1.5; }
        img { max-width:100%; display:block; }
        a { color:inherit; text-decoration:none; }
        button { font-family:inherit; cursor:pointer; }
        input,textarea,select { font-family:inherit; }

        /* ── Layout ──────────────────────────────────────────────── */
        #app { min-height:100vh; display:flex; flex-direction:column; }

        /* ── Login Screen ────────────────────────────────────────── */
        #loginScreen {
            flex:1; display:flex; align-items:center; justify-content:center;
            padding:1.5rem;
        }
        .login-card {
            width:100%; max-width:400px;
            background:var(--surface); border:1px solid var(--glass-b);
            border-radius:var(--radius); padding:2.5rem 2rem;
            box-shadow:0 20px 60px rgba(0,0,0,0.5);
        }
        .login-logo { text-align:center; margin-bottom:2rem; }
        .login-logo i { font-size:2.5rem; background:var(--grad);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text; display:block; margin-bottom:.75rem; }
        .login-logo h1 { font-size:1.4rem; font-weight:700; }
        .login-logo p { font-size:.85rem; color:var(--text-3); margin-top:.3rem; }
        .login-error { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3);
            color:#fca5a5; font-size:.85rem; padding:.65rem 1rem; border-radius:var(--radius-sm);
            margin-bottom:1rem; display:none; }
        .login-error.show { display:block; }

        /* ── Form elements ───────────────────────────────────────── */
        .form-group { margin-bottom:1rem; }
        .form-group label { display:block; font-size:.82rem; font-weight:600;
            color:var(--text-2); margin-bottom:.4rem; text-transform:uppercase;
            letter-spacing:.05em; }
        .form-control {
            width:100%; padding:.65rem .9rem;
            background:var(--surface-2); border:1px solid var(--glass-b);
            border-radius:var(--radius-sm); color:var(--text); font-size:.9rem;
            transition:border-color .2s;
        }
        .form-control:focus { outline:none; border-color:var(--accent); }
        textarea.form-control { resize:vertical; min-height:80px; }
        select.form-control option { background:var(--surface-2); }

        /* ── Buttons ─────────────────────────────────────────────── */
        .btn { display:inline-flex; align-items:center; gap:.45rem;
            padding:.6rem 1.3rem; border-radius:50px; border:none;
            font-size:.88rem; font-weight:600; transition:all .2s; cursor:pointer; }
        .btn-primary { background:var(--grad); color:#fff; box-shadow:0 4px 14px rgba(139,92,246,.35); }
        .btn-primary:hover { opacity:.9; transform:translateY(-1px); }
        .btn-secondary { background:var(--glass); border:1px solid var(--glass-b); color:var(--text-2); }
        .btn-secondary:hover { background:rgba(255,255,255,.1); color:var(--text); }
        .btn-danger { background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.3);
            color:#fca5a5; }
        .btn-danger:hover { background:rgba(239,68,68,.25); }
        .btn-success { background:rgba(16,185,129,.15); border:1px solid rgba(16,185,129,.3);
            color:#6ee7b7; }
        .btn-success:hover { background:rgba(16,185,129,.25); }
        .btn-sm { padding:.38rem .9rem; font-size:.8rem; }
        .btn-full { width:100%; justify-content:center; border-radius:var(--radius-sm); }

        /* ── Admin Layout ────────────────────────────────────────── */
        #adminLayout { display:none; flex:1; flex-direction:column; }
        #adminLayout.visible { display:flex; }

        .admin-header {
            height:64px; background:var(--surface); border-bottom:1px solid var(--glass-b);
            display:flex; align-items:center; justify-content:space-between;
            padding:0 1.5rem; position:sticky; top:0; z-index:100;
        }
        .admin-header-brand { display:flex; align-items:center; gap:.75rem; }
        .admin-header-brand i { font-size:1.3rem; background:var(--grad);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .admin-header-brand h1 { font-size:1.05rem; font-weight:700; }
        .admin-header-actions { display:flex; align-items:center; gap:.75rem; }

        .admin-main { flex:1; display:grid; grid-template-columns:220px 1fr;
            max-height:calc(100vh - 64px); overflow:hidden; }
        @media(max-width:700px){
            .admin-main { grid-template-columns:1fr; }
            .admin-sidebar { display:none; }
        }

        /* ── Sidebar ─────────────────────────────────────────────── */
        .admin-sidebar {
            background:var(--surface); border-right:1px solid var(--glass-b);
            padding:1.5rem 1rem; overflow-y:auto;
        }
        .sidebar-section-title { font-size:.72rem; font-weight:700; text-transform:uppercase;
            letter-spacing:.08em; color:var(--text-3); margin-bottom:.75rem; padding:0 .5rem; }
        .sidebar-nav { list-style:none; }
        .sidebar-nav li { margin-bottom:.25rem; }
        .sidebar-nav button {
            width:100%; display:flex; align-items:center; gap:.65rem;
            padding:.6rem .75rem; border-radius:var(--radius-sm);
            background:transparent; border:none; color:var(--text-2);
            font-size:.88rem; font-weight:500; cursor:pointer; transition:all .2s;
            text-align:left;
        }
        .sidebar-nav button:hover { background:var(--glass); color:var(--text); }
        .sidebar-nav button.active { background:rgba(139,92,246,.15);
            color:var(--accent); border:1px solid rgba(139,92,246,.25); }
        .sidebar-nav button i { width:16px; text-align:center; font-size:.9rem; }

        /* ── Content Area ────────────────────────────────────────── */
        .admin-content { overflow-y:auto; padding:1.75rem; }

        /* ── Page Header ─────────────────────────────────────────── */
        .page-header { display:flex; align-items:center; justify-content:space-between;
            margin-bottom:1.75rem; flex-wrap:wrap; gap:1rem; }
        .page-header h2 { font-size:1.4rem; font-weight:700; }
        .page-header p { font-size:.85rem; color:var(--text-3); margin-top:.25rem; }

        /* ── Stats row ───────────────────────────────────────────── */
        .stats-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
            gap:1rem; margin-bottom:2rem; }
        .stat-card { background:var(--surface); border:1px solid var(--glass-b);
            border-radius:var(--radius); padding:1.25rem 1rem; text-align:center; }
        .stat-card .stat-num { font-size:2rem; font-weight:800; background:var(--grad);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .stat-card .stat-lbl { font-size:.8rem; color:var(--text-3); margin-top:.25rem; }

        /* ── Design Table / Cards ────────────────────────────────── */
        .design-list { display:grid; gap:1rem; }
        .design-item {
            background:var(--surface); border:1px solid var(--glass-b);
            border-radius:var(--radius); padding:1rem; display:flex;
            align-items:flex-start; gap:1rem;
        }
        .design-item-thumb {
            width:80px; height:60px; border-radius:var(--radius-sm);
            background:var(--surface-2); overflow:hidden; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            font-size:1.5rem;
        }
        .design-item-thumb img { width:100%; height:100%; object-fit:cover; }
        .design-item-info { flex:1; min-width:0; }
        .design-item-title { font-weight:600; font-size:.95rem; white-space:nowrap;
            overflow:hidden; text-overflow:ellipsis; }
        .design-item-meta { font-size:.78rem; color:var(--text-3); margin-top:.2rem; }
        .design-item-cat { display:inline-block; font-size:.72rem; padding:.18rem .55rem;
            border-radius:50px; background:rgba(139,92,246,.15); border:1px solid rgba(139,92,246,.25);
            color:var(--accent); margin-top:.4rem; }
        .design-item-actions { display:flex; gap:.5rem; flex-shrink:0; flex-wrap:wrap; }

        /* ── Modal / Drawer ──────────────────────────────────────── */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,.7);
            backdrop-filter:blur(6px); z-index:1000;
            display:flex; align-items:center; justify-content:center;
            padding:1.5rem; opacity:0; visibility:hidden; transition:opacity .3s,visibility .3s;
        }
        .modal-overlay.active { opacity:1; visibility:visible; }
        .modal-box {
            background:var(--surface); border:1px solid var(--glass-b);
            border-radius:var(--radius); padding:2rem; width:100%; max-width:560px;
            max-height:92vh; overflow-y:auto;
            transform:scale(.95); transition:transform .3s;
        }
        .modal-overlay.active .modal-box { transform:scale(1); }
        .modal-header { display:flex; align-items:center; justify-content:space-between;
            margin-bottom:1.5rem; }
        .modal-header h3 { font-size:1.15rem; font-weight:700; }
        .modal-close { background:none; border:none; color:var(--text-3);
            font-size:1.3rem; cursor:pointer; line-height:1; padding:.25rem; }
        .modal-close:hover { color:var(--text); }
        .modal-footer { display:flex; gap:.75rem; justify-content:flex-end;
            margin-top:1.5rem; flex-wrap:wrap; }

        /* ── Toast ───────────────────────────────────────────────── */
        .toast-container { position:fixed; bottom:1.5rem; right:1.5rem;
            z-index:9999; display:flex; flex-direction:column; gap:.6rem; }
        .toast { background:var(--surface); border:1px solid var(--glass-b);
            border-radius:var(--radius-sm); padding:.75rem 1.1rem;
            font-size:.88rem; min-width:220px; max-width:340px;
            box-shadow:0 8px 24px rgba(0,0,0,.4);
            display:flex; align-items:center; gap:.6rem;
            animation:toastIn .3s ease; }
        .toast.success { border-color:rgba(16,185,129,.4); }
        .toast.error   { border-color:rgba(239,68,68,.4); }
        .toast i { font-size:1rem; }
        .toast.success i { color:var(--accent-success); }
        .toast.error   i { color:var(--accent-danger); }
        @keyframes toastIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:none} }

        /* ── Confirm Dialog ──────────────────────────────────────── */
        .confirm-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,.75);
            backdrop-filter:blur(4px); z-index:2000;
            display:flex; align-items:center; justify-content:center;
            padding:1.5rem; opacity:0; visibility:hidden; transition:opacity .2s,visibility .2s;
        }
        .confirm-overlay.active { opacity:1; visibility:visible; }
        .confirm-box { background:var(--surface); border:1px solid rgba(239,68,68,.35);
            border-radius:var(--radius); padding:1.75rem; max-width:380px; width:100%;
            text-align:center; }
        .confirm-box i { font-size:2rem; color:#fca5a5; margin-bottom:.75rem; }
        .confirm-box h3 { font-size:1.1rem; font-weight:700; margin-bottom:.5rem; }
        .confirm-box p { font-size:.88rem; color:var(--text-2); margin-bottom:1.25rem; }
        .confirm-actions { display:flex; gap:.75rem; justify-content:center; }

        /* ── Image preview ───────────────────────────────────────── */
        .img-preview-wrap { margin-top:.6rem; }
        .img-preview { width:100%; max-height:180px; object-fit:contain;
            border-radius:var(--radius-sm); border:1px solid var(--glass-b);
            background:var(--surface-2); display:none; }
        .img-preview.show { display:block; }

        /* ── Empty state ─────────────────────────────────────────── */
        .empty-state { text-align:center; padding:3rem 1.5rem; color:var(--text-3); }
        .empty-state i { font-size:2.5rem; margin-bottom:1rem; display:block; opacity:.4; }
        .empty-state h3 { font-size:1.1rem; color:var(--text-2); margin-bottom:.5rem; }

        /* ── Scrollbar ───────────────────────────────────────────── */
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:3px; }
    </style>
</head>
<body>
<div id="app">
    <!-- Login -->
    <div id="loginScreen">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-palette"></i>
                <h1>SimShad Admin</h1>
                <p>Designs Gallery Manager</p>
            </div>
            <div class="login-error" id="loginError">Incorrect password. Please try again.</div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="Enter admin password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
        </div>
    </div>

    <!-- Admin Layout -->
    <div id="adminLayout">
        <header class="admin-header">
            <div class="admin-header-brand">
                <i class="fas fa-palette"></i>
                <h1>Designs Admin</h1>
            </div>
            <div class="admin-header-actions">
                <a href="designs.html" class="btn btn-secondary btn-sm" target="_blank">
                    <i class="fas fa-external-link-alt"></i> View Gallery
                </a>
                <button class="btn btn-secondary btn-sm" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </header>

        <div class="admin-main">
            <aside class="admin-sidebar">
                <p class="sidebar-section-title">Navigation</p>
                <ul class="sidebar-nav">
                    <li><button class="active" data-page="dashboard" id="navDashboard">
                        <i class="fas fa-th-large"></i> Dashboard
                    </button></li>
                    <li><button data-page="designs" id="navDesigns">
                        <i class="fas fa-images"></i> Designs
                    </button></li>
                    <li><button data-page="add" id="navAdd">
                        <i class="fas fa-plus-circle"></i> Add Design
                    </button></li>
                </ul>
            </aside>

            <main class="admin-content" id="adminContent">
                <!-- Injected by admin.js -->
            </main>
        </div>
    </div>
</div>

<!-- Design Form Modal -->
<div class="modal-overlay" id="designModal">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modalTitle">Add New Design</h3>
            <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <form id="designForm">
            <input type="hidden" id="designId">
            <div class="form-group">
                <label for="designTitle">Title *</label>
                <input type="text" id="designTitle" class="form-control" placeholder="e.g. Mobile App UI" required>
            </div>
            <div class="form-group">
                <label for="designCategory">Category *</label>
                <input type="text" id="designCategory" class="form-control"
                    placeholder="e.g. UI/UX, Logo, Branding, Illustration" list="categorySuggestions" required>
                <datalist id="categorySuggestions">
                    <option value="UI/UX">
                    <option value="Logo Design">
                    <option value="Branding">
                    <option value="Web Design">
                    <option value="Mobile App">
                    <option value="Illustration">
                    <option value="Social Media">
                    <option value="Print Design">
                </datalist>
            </div>
            <div class="form-group">
                <label for="designDesc">Description</label>
                <textarea id="designDesc" class="form-control" rows="3" placeholder="Brief description of this design..."></textarea>
            </div>
            <div class="form-group">
                <label for="designTools">Tools Used</label>
                <input type="text" id="designTools" class="form-control" placeholder="Figma, Adobe XD, Photoshop...">
            </div>
            <div class="form-group">
                <label for="designImageUrl">Image URL</label>
                <input type="url" id="designImageUrl" class="form-control" placeholder="https://...">
                <div class="img-preview-wrap">
                    <img class="img-preview" id="imagePreview" alt="Preview">
                </div>
            </div>
            <div class="form-group">
                <label for="designDate">Date</label>
                <input type="month" id="designDate" class="form-control">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelDesign">Cancel</button>
                <button type="submit" class="btn btn-primary" id="saveDesign">
                    <i class="fas fa-save"></i> Save Design
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Confirm Delete Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <i class="fas fa-trash-alt"></i>
        <h3>Delete Design?</h3>
        <p id="confirmMsg">This action cannot be undone.</p>
        <div class="confirm-actions">
            <button class="btn btn-secondary" id="confirmCancel">Cancel</button>
            <button class="btn btn-danger" id="confirmOk">
                <i class="fas fa-trash"></i> Delete
            </button>
        </div>
    </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script src="assets/js/admin.js"></script>
</body>
</html>
